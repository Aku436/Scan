<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keamanan Sistem</title>
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:50px 20px;
}
#lock{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  z-index:999;
  padding-top:100px;
}
h1{font-size:28px;color:red;animation:blink 0.5s infinite}
@keyframes blink{50%{opacity:0}}
button{
  padding:15px;
  width:80%;
  background:red;
  color:white;
  border:none;
  border-radius:10px;
  font-size:18px;
  margin-top:30px;
}
.lock-icon{font-size:80px;margin-bottom:20px}
</style>
</head>
<body>

<h2>⚠️ HP Terdeteksi Virus ⚠️</h2>
<p>HP kamu terinfeksi 13 virus berbahaya</p>
<button onclick="kunci()">SCAN & KUNCI HP SEKARANG</button>

<div id="lock">
  <div class="lock-icon">🔒</div>
  <h1>HP AKAN DI KUNCI</h1>
  <p id="timer">Mengkunci dalam 5 detik...</p>
  <p style="font-size:60px;margin-top:50px">😂</p>
  <h2>KENA PRANK BRO!</h2>
  <p style="color:gray">Tinggal pencet tombol back HP kamu</p>
</div>

<audio id="alarm" src="https://www.soundjay.com/alarms/sounds/alarm-clock-01.mp3" loop></audio>

<script>
function kunci(){
  // Bikin geter HP kalo support
  if(navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
  
  document.getElementById('lock').style.display='block';
  document.getElementById('alarm').play();
  
  // Countdown
  let i = 5;
  let t = setInterval(()=>{
    document.getElementById('timer').innerText = `Mengkunci dalam ${i} detik...`;
    i--;
    if(i < 0){
      clearInterval(t);
      document.getElementById('timer').innerText = 'Gagal mengunci wkwk KENA PRANK';
      document.getElementById('alarm').pause();
    }
  }, 1000);
}
</script>

</body>
</html>
